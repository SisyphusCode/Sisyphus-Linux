# Sisyphus Linux — Calamares native installer (Kiwi OEM + overlayroot).
---
modules-search: [ local ]

instances:
- id: forge
  module: shellprocess
  config: shellprocess@forge.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - locale
  - keyboard
  - localecfg
  - fstab
  - users
  - shellprocess@forge
  - networkcfg
  - hwclock
  - dracut
  - bootloader
  - umount
- show:
  - finished

branding: sisyphus

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: true
quit-at-end: false