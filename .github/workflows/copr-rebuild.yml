name: COPR rebuild

on:
  push:
    branches: [main]
    paths:
      - 'the-forge/**'
      - 'installer/**'
      - '.github/workflows/copr-rebuild.yml'
  workflow_dispatch:

jobs:
  trigger-the-forge:
    if: contains(github.event.head_commit.modified, 'the-forge') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the-forge COPR webhook
        run: |
          curl -fsS -X POST \
            "https://copr.fedorainfracloud.org/api/v1/webhooks/${{ secrets.COPR_THE_FORGE_WEBHOOK }}"

  trigger-installer:
    if: contains(github.event.head_commit.modified, 'installer') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sisyphus-linux COPR webhook
        run: |
          curl -fsS -X POST \
            "https://copr.fedorainfracloud.org/api/v1/webhooks/${{ secrets.COPR_SISYPHUS_LINUX_WEBHOOK }}"
