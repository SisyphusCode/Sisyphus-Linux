name = "dbus"
description = "D-Bus system message bus"
command = "/usr/bin/dbus-daemon"
args = ["--system", "--nofork"]
need = ["devfs", "localmount"]
use = ["logger"]
runlevels = ["default", "multi-user", "graphical"]
user = "dbus"
group = "dbus"

[environment]
DBUS_SYSTEM_BUS_ADDRESS = "unix:path=/run/dbus/system_bus_socket"
