name = "logind"
description = "Login manager (elogind or systemd-logind)"
command = "/usr/libexec/forge/start-logind.sh"
args = []
type = "notify-reload"
bus-name = "org.freedesktop.login1"
after = ["forge-early", "dbus", "udev"]
runlevels = ["multi-user", "graphical"]
timeout_secs = 120
restart = "on-failure"
# The wrapper auto-detects elogind or systemd-logind.
# For direct use (no wrapper): command = "/usr/libexec/elogind/elogind" (or equivalent path)
# The special launcher in Rust will still apply SELinux wrap etc. if needed.

[sandbox]
private-tmp = true
protect-system = true
no-new-privileges = true